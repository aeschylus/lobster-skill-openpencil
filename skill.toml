[skill]
name = "openpencil"
version = "1.1.0"
description = "Inspect, search, and export .fig design files — and run the OpenPencil web UI — from the command line"
author = "aeschylus"
category = "tool"

[activation]
mode = "triggered"
triggers = ["/fig", "/openpencil"]
context_patterns = [
  "when user asks about a .fig file",
  "when user wants to inspect a design file",
  "when user wants to export a Figma file",
  "when user mentions openpencil",
  "when user wants to start or stop the openpencil server",
  "when user wants to open a design in the browser",
]

[layering]
priority = 50
merge_strategy = "append"

[provides]
mcp_tools = [
  "openpencil_info",
  "openpencil_tree",
  "openpencil_find",
  "openpencil_export",
  "openpencil_start_server",
  "openpencil_stop_server",
]
bot_commands = ["/fig", "/openpencil"]

[compatibility]
enhances = []
conflicts = []

[dependencies]
pip = []
npm = []
system = ["bun"]
api_keys = []

[dependencies.runtime]
# bun is required to run bunx @open-pencil/cli and `bun run dev`
# install from https://bun.sh
